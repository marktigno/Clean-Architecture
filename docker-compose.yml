  #     - POSTGRES_DB=TodoDB
  #     - POSTGRES_USER=postgres
  #     - POSTGRES_PASSWORD=postgres
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   ports:
  #     - 5432:5432

volumes:
  mssql-data:
    driver: local
